<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Besucher-Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  background: #0e0e0e;
  color: #eee;
  font-family: Arial, sans-serif;
  padding: 20px;
}
h1 { text-align:center; margin-bottom:30px; }

.dashboard {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}

.page-box {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 10px;
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  width: 600px;
  min-width: 320px;
}

.chart-wrap { flex: 2; }
.table-wrap { flex: 1; margin-left:10px; overflow-y:auto; max-height:220px; }
table { width:100%; border-collapse: collapse; font-size:12px; }
th, td { border:1px solid #333; padding:4px; text-align:center; }
th { background:#111; }
canvas { width:100% !important; height:220px !important; }

@media (max-width: 650px) {
  .page-box { flex-direction: column; width: 100%; }
  .table-wrap { margin-left:0; margin-top:10px; max-height:150px; }
}
</style>
</head>
<body>

<h1>📊 Besucher-Dashboard</h1>
<div class="dashboard" id="dashboard"></div>

<script>
const PAGES = ["index","bewerber","wahl-info"];
const DAYS_BACK = 30;

const colors = {
  index: { border:"#F2A900", background:"rgba(242,169,0,0.2)" },
  bewerber: { border:"#00BFFF", background:"rgba(0,191,255,0.2)" },
  "wahl-info": { border:"#7CFC00", background:"rgba(124,252,0,0.2)" }
};

const cachedData = {}; // Besucherzahlen
const charts = {};     // Chart-Objekte

// Format YYYY-MM-DD
function formatDate(offset){
  const d=new Date();
  d.setDate(d.getDate()-offset);
  return d.toISOString().slice(0,10);
}

// Hit für aktuelle Seite (Key wird automatisch erstellt, falls nicht existent)
async function hitKey(page){
  const date = formatDate(0);
  const key = `visit_${page}_${date}`;
  try{
    await fetch(`https://countapi.mileshilliard.com/api/v1/hit/${key}`);
  }catch(e){ console.warn(e); }
}

// GET Wert von Key
async function getValue(key){
  try{
    const res = await fetch(`https://countapi.mileshilliard.com/api/v1/get/${key}`);
    if(res.ok){
      const data = await res.json();
      return data.value || 0;
    }
  }catch(e){ console.warn(e); }
  return 0;
}

// Dashboard initial laden
async function loadDashboard(){
  const container = document.getElementById("dashboard");

  for(const page of PAGES){
    cachedData[page] = [];

    // Box
    const box = document.createElement("div");
    box.className = "page-box";
    container.appendChild(box);

    // Chart
    const chartWrap = document.createElement("div");
    chartWrap.className = "chart-wrap";
    const canvas = document.createElement("canvas");
    chartWrap.appendChild(canvas);
    box.appendChild(chartWrap);

    // Tabelle
    const tableWrap = document.createElement("div");
    tableWrap.className = "table-wrap";
    const table = document.createElement("table");
    table.innerHTML = "<tr><th>Datum</th><th>Besucher</th></tr>";
    tableWrap.appendChild(table);
    box.appendChild(tableWrap);

    // Labels und Werte sammeln
    const labels = [];
    const values = [];

    for(let i=DAYS_BACK-1;i>=0;i--){
      const date=formatDate(i);
      const key = `visit_${page}_${date}`;
      const value = await getValue(key);

      cachedData[page].push(value);
      labels.push(date);
      values.push(value);

      // Tabellenzeile
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${date}</td><td>${value}</td>`;
      table.appendChild(tr);
    }

    // Chart erstellen
    charts[page] = new Chart(canvas,{
      type:"line",
      data:{
        labels,
        datasets:[{
          label:`Besucher – ${page}`,
          data: values,
          borderColor: colors[page].border,
          backgroundColor: colors[page].background,
          fill: true,
          tension: 0.3
        }]
      },
      options:{
        responsive:true,
        plugins:{ legend:{ labels:{ color:"#eee", font:{size:12} } } },
        scales:{
          x:{ ticks:{ color:"#ccc", maxRotation:0 } },
          y:{ ticks:{ color:"#ccc" }, beginAtZero:true, min:0, suggestedMax: Math.max(1,...values) }
        }
      }
    });
  }
}

// Dashboard Daten aktualisieren
async function updateDashboard(){
  for(const page of PAGES){
    const values = [];
    for(let i=DAYS_BACK-1;i>=0;i--){
      const date = formatDate(i);
      const key = `visit_${page}_${date}`;
      const value = await getValue(key);
      values.push(value);
    }
    cachedData[page] = values;

    // Chart-Daten aktualisieren
    charts[page].data.datasets[0].data = values;
    charts[page].update();

    // Tabelle aktualisieren
    const box = charts[page].canvas.parentElement.parentElement;
    const table = box.querySelector("table");
    const rows = table.querySelectorAll("tr:not(:first-child)");
    values.forEach((v,i)=>{
      rows[i].children[1].textContent = v;
    });
  }
}

// Hit für aktuelle Seite
const currentPage = window.location.pathname.includes("bewerber") ? "bewerber" :
                    window.location.pathname.includes("wahl-info") ? "wahl-info" : "index";
hitKey(currentPage);

// Dashboard initial laden
loadDashboard();

// Automatische Aktualisierung alle 30 Sekunden
setInterval(updateDashboard, 30000);
</script>

</body>
</html>
