<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Besucher-Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  background: #0e0e0e;
  color: #eee;
  font-family: Arial, sans-serif;
  padding: 20px;
}
h1 { text-align:center; margin-bottom:30px; }

.dashboard {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}

.page-box {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  width: 600px;
  min-width: 320px;
}

canvas { width:100% !important; height:250px !important; }

@media (max-width: 650px) {
  .page-box { width: 100%; }
}
</style>
</head>
<body>

<h1>📊 Besucher-Dashboard</h1>
<div class="dashboard" id="dashboard"></div>

<script>
const PAGES = ["index","bewerber","wahl-info"];
const DAYS_BACK = 30;

const colors = {
  index: { border:"#F2A900", background:"rgba(242,169,0,0.2)" },
  bewerber: { border:"#00BFFF", background:"rgba(0,191,255,0.2)" },
  "wahl-info": { border:"#7CFC00", background:"rgba(124,252,0,0.2)" }
};

const charts = {};

// Format YYYY-MM-DD
function formatDate(offset){
  const d = new Date();
  d.setDate(d.getDate()-offset);
  return d.toISOString().slice(0,10);
}

// Hit für aktuelle Seite
async function hitKey(page){
  const date = formatDate(0);
  const key = `visit_${page}_${date}`;
  try{
    await fetch(`https://countapi.mileshilliard.com/api/v1/hit/${key}`);
  }catch(e){ console.warn(e); }
}

// GET Wert von Key
async function getValue(key){
  try{
    const res = await fetch(`https://countapi.mileshilliard.com/api/v1/get/${key}`);
    if(res.ok){
      const data = await res.json();
      return data.value || 0;
    }
  }catch(e){ console.warn(e); }
  return 0;
}

// Initialisiere Keys der letzten 30 Tage auf 0
async function initKeys(){
  const promises = [];
  for(const page of PAGES){
    for(let i=DAYS_BACK-1;i>=0;i--){
      const date = formatDate(i);
      const key = `visit_${page}_${date}`;
      promises.push(fetch(`https://countapi.mileshilliard.com/api/v1/set/${key}?value=0`).catch(e=>console.warn(e)));
    }
  }
  await Promise.all(promises);
}

// Dashboard initial laden
async function loadDashboard(){
  const container = document.getElementById("dashboard");

  for(const page of PAGES){
    const box = document.createElement("div");
    box.className = "page-box";
    container.appendChild(box);

    const canvas = document.createElement("canvas");
    box.appendChild(canvas);

    // Alle Werte parallel abrufen
    const promises = [];
    for(let i=DAYS_BACK-1;i>=0;i--){
      const date = formatDate(i);
      const key = `visit_${page}_${date}`;
      promises.push(getValue(key));
    }
    const values = await Promise.all(promises);
    const labels = Array.from({length:DAYS_BACK}, (_,i) => formatDate(DAYS_BACK-1-i));

    charts[page] = new Chart(canvas,{
      type:"line",
      data:{
        labels,
        datasets:[{
          label: `Besucher – ${page}`,
          data: values,
          borderColor: colors[page].border,
          backgroundColor: colors[page].background,
          fill: true,
          tension: 0.3
        }]
      },
      options:{
        responsive:true,
        plugins:{ legend:{ labels:{ color:"#eee", font:{size:12} } } },
        scales:{
          x:{ ticks:{ color:"#ccc", maxRotation:0 } },
          y:{ ticks:{ color:"#ccc" }, beginAtZero:true, min:0, suggestedMax: Math.max(1,...values) }
        }
      }
    });
  }
}

// Dashboard Daten aktualisieren (parallel)
async function updateDashboard(){
  for(const page of PAGES){
    const promises = [];
    for(let i=DAYS_BACK-1;i>=0;i--){
      const date = formatDate(i);
      const key = `visit_${page}_${date}`;
      promises.push(getValue(key));
    }
    const values = await Promise.all(promises);
    charts[page].data.datasets[0].data = values;
    charts[page].update();
  }
}

// Hauptfunktion
async function main(){
  await initKeys();
  const path = window.location.pathname.toLowerCase();
  const currentPage = path.includes("bewerber") ? "bewerber" :
                      path.includes("wahl-info") ? "wahl-info" : "index";
  await hitKey(currentPage);
  await loadDashboard();
  setInterval(updateDashboard, 30000);
}

main();
</script>

</body>
</html>
