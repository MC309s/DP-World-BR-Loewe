<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Besucher-Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  background: #0e0e0e;
  color: #eee;
  font-family: Arial, sans-serif;
  padding: 20px;
}
h1 { margin-bottom: 20px; text-align:center; }
.dashboard { display: flex; gap: 20px; justify-content: space-around; flex-wrap: wrap; }
.page-box {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 8px;
  width: 30%;
  min-width: 280px;
}
.page-box h2 { font-size: 18px; margin-bottom: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px; }
th, td { border: 1px solid #333; padding: 4px; text-align: center; }
th { background: #111; }
canvas { width: 100% !important; height: 200px !important; }
</style>
</head>
<body>

<h1>📊 Besucher-Dashboard</h1>
<div class="dashboard" id="dashboard"></div>

<script>
const PAGES = ["index", "bewerber", "wahl-info"];
const colors = {
  index: { border: "#F2A900", background: "rgba(242,169,0,0.2)" },
  bewerber: { border: "#00BFFF", background: "rgba(0,191,255,0.2)" },
  "wahl-info": { border: "#7CFC00", background: "rgba(124,252,0,0.2)" }
};
const DAYS_BACK = 30;

// Format YYYY-MM-DD
function formatDate(offset) {
  const d = new Date();
  d.setDate(d.getDate() - offset);
  return d.toISOString().slice(0,10);
}

// Prüfen und erstellen (optional, nur wenn noch nicht existiert)
async function initKey(key) {
  try {
    const res = await fetch(`https://countapi.mileshilliard.com/api/v1/get/${key}`);
    if (res.status === 404) {
      await fetch(`https://countapi.mileshilliard.com/api/v1/set/${key}?value=0`);
    }
  } catch(e) { console.warn(e); }
}

// Hit (Besucher zählen)
async function hitKey(page) {
  const date = formatDate(0);
  const key = `visit_${page}_${date}`;
  try {
    await fetch(`https://countapi.mileshilliard.com/api/v1/hit/${key}`);
  } catch(e) { console.warn(e); }
}

// Dashboard laden
async function loadDashboard() {
  const container = document.getElementById("dashboard");

  for (const page of PAGES) {
    // Box für jede Seite
    const box = document.createElement("div");
    box.className = "page-box";
    container.appendChild(box);

    const h2 = document.createElement("h2");
    h2.textContent = page.toUpperCase();
    box.appendChild(h2);

    const labels = [];
    const values = [];

    // Tabelle
    const table = document.createElement("table");
    table.innerHTML = "<tr><th>Datum</th><th>Besucher</th></tr>";
    box.appendChild(table);

    for (let i = DAYS_BACK - 1; i >= 0; i--) {
      const date = formatDate(i);
      const key = `visit_${page}_${date}`;
      await initKey(key);

      let value = 0;
      try {
        const res = await fetch(`https://countapi.mileshilliard.com/api/v1/get/${key}`);
        const data = await res.json();
        value = data.value || 0;
      } catch(e) { console.warn(e); }

      labels.push(date);
      values.push(value);

      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${date}</td><td>${value}</td>`;
      table.appendChild(tr);
    }

    // Chart
    const canvas = document.createElement("canvas");
    box.appendChild(canvas);
    new Chart(canvas, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: `Besucher – ${page}`,
          data: values,
          borderColor: colors[page].border,
          backgroundColor: colors[page].background,
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: "#eee", font: { size: 12 } } }
        },
        scales: {
          x: { ticks: { color: "#ccc", maxRotation: 0 } },
          y: { ticks: { color: "#ccc" }, beginAtZero:true, min:0, suggestedMax: Math.max(1,...values) }
        }
      }
    });
  }
}

// Hit für aktuelle Seite
const currentPage = window.location.pathname.includes("bewerber") ? "bewerber" :
                    window.location.pathname.includes("wahl-info") ? "wahl-info" : "index";
hitKey(currentPage);

// Dashboard laden
loadDashboard();

</script>

</body>
</html>
