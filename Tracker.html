<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Privates Besucher-Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #121212;
      color: #eee;
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 20px;
    }
    h1 { 
      margin-bottom: 15px;
      font-size: 2em;
      text-align: center;
      color: #f2a900;
    }
    h2 { 
      margin-top: 30px;
      font-size: 1.3em;
      color: #00bfff;
    }
    .table-container {
      margin-top: 10px;
      width: 100%;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85em;
      margin-bottom: 15px;
    }
    th, td {
      border: 1px solid #333;
      padding: 4px 6px;
      text-align: center;
    }
    th {
      background: #1f1f1f;
    }
    .canvas-wrap {
      margin-bottom: 40px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    canvas {
      width: 100% !important;
      height: 300px !important;
    }
  </style>
</head>
<body>
  <h1>📊 Besucher-Dashboard</h1>
  <div id="dashboard"></div>

  <script>
    const NAMESPACE = "loewen-br";
    const PAGES = ["index", "bewerber", "wahl-info"];
    const DAYS_BACK = 30;

    const colors = {
      index: { border: "#f2a900", background: "rgba(242,169,0,0.2)" },
      bewerber: { border: "#00bfff", background: "rgba(0,191,255,0.2)" },
      "wahl-info": { border: "#7cfc00", background: "rgba(124,252,0,0.2)" }
    };

    function formatDate(offset) {
      const d = new Date();
      d.setDate(d.getDate() - offset);
      return d.toISOString().slice(0, 10);
    }

    async function trackVisit(page) {
      const date = new Date().toISOString().slice(0, 10);
      const key = `visit_${page}_${date}`;
      try {
        await fetch(`https://countapi.mileshilliard.com/hit/${NAMESPACE}/${key}`);
      } catch (err) {
        console.warn(`Fehler beim Tracken von ${key}:`, err);
      }
    }

    async function loadDashboard() {
      const container = document.getElementById("dashboard");

      for (const page of PAGES) {
        const labels = [];
        const values = [];

        let tableHtml = `<div class="table-container">
          <h2>Seite: ${page}</h2>
          <table>
            <tr><th>Datum</th><th>Besucher</th></tr>`;

        for (let i = DAYS_BACK - 1; i >= 0; i--) {
          const date = formatDate(i);
          const key = `visit_${page}_${date}`;
          let value = 0;

          try {
            const res = await fetch(`https://countapi.mileshilliard.com/get/${NAMESPACE}/${key}`);
            const data = await res.json();
            value = data.value || 0;
          } catch (err) {
            console.warn(`Fehler beim Laden von ${key}:`, err);
          }

          labels.push(date);
          values.push(value);
          tableHtml += `<tr><td>${date}</td><td>${value}</td></tr>`;
        }

        tableHtml += "</table></div>";
        container.innerHTML += tableHtml;

        const canvasWrap = document.createElement("div");
        canvasWrap.className = "canvas-wrap";
        const canvas = document.createElement("canvas");
        canvasWrap.appendChild(canvas);
        container.appendChild(canvasWrap);

        // Chart mit sanften Kurven und Punkten
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createLinearGradient(0,0,0,300);
        gradient.addColorStop(0, colors[page].background);
        gradient.addColorStop(1, "rgba(0,0,0,0)");

        new Chart(canvas, {
          type: "line",
          data: {
            labels,
            datasets: [{
              label: `Besucher – ${page}`,
              data: values,
              borderColor: colors[page].border,
              backgroundColor: gradient,
              tension: 0.4,
              fill: true,
              pointRadius: 3,
              pointHoverRadius: 6,
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { labels: { color: "#eee" } },
              tooltip: { mode: 'index', intersect: false }
            },
            scales: {
              x: { 
                ticks: { color: "#ccc", maxRotation: 45, minRotation: 45 },
                grid: { color: "#333" }
              },
              y: {
                ticks: { color: "#ccc" },
                grid: { color: "#333" },
                beginAtZero: true,
                min: 0,
                suggestedMax: Math.max(1, ...values)
              }
            }
          }
        });
      }
    }

    // Aktuelle Seite tracken
    const currentPage = window.location.pathname.includes("bewerber") ? "bewerber" :
                        window.location.pathname.includes("wahl-info") ? "wahl-info" : "index";
    trackVisit(currentPage);

    // Dashboard laden
    loadDashboard();
  </script>
</body>
</html>
